<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Heleena Jyothsna</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
            color:white;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:650px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            padding:50px;
            border-radius:20px;
            box-shadow:0 10px 35px rgba(0,0,0,.3);
        }

        .tick{
            width:100px;
            height:100px;
            margin:auto;
            border-radius:50%;
            background:#22c55e;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:55px;
            margin-bottom:25px;
        }

        h1{
            font-size:38px;
            margin-bottom:15px;
        }

        p{
            font-size:18px;
            line-height:1.7;
            margin-bottom:35px;
        }

        a{
            text-decoration:none;
            color:white;
            background:#2563eb;
            padding:14px 35px;
            border-radius:50px;
            font-weight:600;
            transition:.3s;
        }

        a:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="tick">
            ✓
        </div>

        <h1>Thank You!</h1>

        <p>
            Your message has been successfully sent.
            <br><br>
            Thank you for visiting my portfolio.
            I truly appreciate your time and interest.
            I will get back to you as soon as possible.
        </p>

        <a href="index.html">← Back to Portfolio</a>

    </div>

</body>
</html>
